---
zabbix_server: "127.0.0.1"  # Set to the Zabbix server IP/hostname
zabbix_version: "7.4"
zabbix_function: agent  # agent | server | proxy

# Zabbix admin credentials (used by zabbix_add_host)
zabbix_admin_password: zabbix

## Database connection ##
db_backend: mysql  # mysql | pgsql
db_pass: changeme

zabbix_db: zabbix
zabbix_user: zabbix
zabbix_pass: zabbix

external_script_dir: "/usr/lib/zabbix/externalscripts"
tls: false
ssl: false

### Proxy config ###
proxy_db_backend: sqlite3  # sqlite3 | mysql | pgsql
proxy_db_pass: changeme
zabbix_proxy_db: /var/lib/zabbix/zabbix_proxy.db  # file path for sqlite3, DB name for mysql/pgsql
zabbix_proxy_user: zabbixProxy
zabbix_proxy_pass: zabbixProxy
proxyMode: active  # active | passive

proxy: false

vmType: vz

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64

cpus: 2
memory: "2GiB"
disk: "20GiB"

networks:
  - vzNAT: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      hostnamectl set-hostname zabbix-proxy

---
- hosts: PRODUCTION
  become: yes
  become_method: sudo
  gather_facts: yes
  roles:
    - ansible-zabbix

# Also install the agent on the server VM so the built-in
# "Zabbix server" host can monitor it at 127.0.0.1:10050
- hosts: PRODUCTION:&ZABBIX_SERVER
  become: yes
  become_method: sudo
  gather_facts: yes
  vars:
    zabbix_function: agent
  roles:
    - role: ansible-zabbix
      tags:
        - agent.install

---
- name: Install MariaDB for proxy
  ansible.builtin.include_role:
    name: ansible-mysql
  vars:
    mysql_root_db_pass: "{{ proxy_db_pass }}"
    mysql_db:
      - name: "{{ zabbix_proxy_db }}"
    mysql_users:
      - name: "{{ zabbix_proxy_user }}"
        pass: "{{ zabbix_proxy_pass }}"
        priv: "*.*:ALL"
  when: proxy_db_backend != 'sqlite3'
  tags:
    - proxy.install

- name: Install zabbix proxy packages
  ansible.builtin.apt:
    name:
      - "zabbix-proxy-{{ proxy_db_backend }}"
      - zabbix-sql-scripts
    state: present
  tags:
    - proxy.install

- name: Ensure SQLite3 database directory exists
  ansible.builtin.file:
    path: "{{ zabbix_proxy_db | dirname }}"
    state: directory
    owner: zabbix
    group: zabbix
    mode: "0750"
  when: proxy_db_backend == 'sqlite3'
  tags:
    - proxy.install

- name: Check if Zabbix proxy schema is already imported
  ansible.builtin.command: >
    mysql --user={{ zabbix_proxy_user }} --password={{ zabbix_proxy_pass }}
    --batch --skip-column-names
    --execute="SELECT COUNT(*) FROM information_schema.tables
               WHERE table_schema='{{ zabbix_proxy_db }}' AND table_name='hosts'"
  register: proxy_schema_check
  changed_when: false
  failed_when: false
  when: proxy_db_backend != 'sqlite3'
  tags:
    - proxy.install

- name: Import Zabbix proxy database schema
  ansible.builtin.shell: >
    mysql --user={{ zabbix_proxy_user }} --password={{ zabbix_proxy_pass }} {{ zabbix_proxy_db }}
    < {{ zabbix_proxy_schema_path }}
  when: proxy_db_backend != 'sqlite3' and proxy_schema_check.stdout | default('0') | trim == '0'
  tags:
    - proxy.install

- name: Enable zabbix-proxy service
  ansible.builtin.service:
    name: zabbix-proxy
    enabled: yes
  tags:
    - proxy.install

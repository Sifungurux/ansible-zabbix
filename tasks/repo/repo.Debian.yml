---

- name: Install pre-req for installation of repo
  apt: name=curl state=present

- name: Get repo filename from index
  shell: >
    curl -s "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/release/{{ ansible_facts['distribution'] | lower }}/pool/main/z/zabbix-release/"
    | grep -o 'zabbix-release[^"]*_all\.deb' | grep -v '%' | tail -1
  register: repo_name
  changed_when: false

- name: Fail if repo filename not found
  fail:
    msg: "Could not find .deb for {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }} (zabbix_version={{ zabbix_version }})"
  when: repo_name.stdout | trim == ""

- set_fact:
    ansible_zabbix_repo: "{{ repo_name.stdout | trim }}"
  tags: repo

- name: Downloading zabbix repo .deb file
  get_url:
    url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/release/{{ ansible_facts['distribution'] | lower }}/pool/main/z/zabbix-release/{{ ansible_zabbix_repo }}"
    dest: "/tmp/{{ ansible_zabbix_repo }}"
  tags:
    - repo

- name: Install zabbix repo
  apt: deb="/tmp/{{ ansible_zabbix_repo }}"
  tags:
    - repo

- name: Update packages repository
  apt: update_cache=yes
  changed_when: false
  tags:
    - repo

---
- name: Create zabbix_agentd.d directory
  ansible.builtin.file:
    path: /etc/zabbix/zabbix_agentd.d
    state: directory
  tags:
    - userparam

- name: Copy userparam script to agent
  ansible.builtin.copy:
    src: "{{ userparam_dir }}/{{ item.script }}"
    dest: "/etc/zabbix/zabbix_agentd.d/{{ item.name }}.conf"
    owner: zabbix
    group: zabbix
    mode: "0644"
    backup: yes
    validate: grep '^UserParameter=.*\[\*], .*' %s
  loop: "{{ userparam }}"
  notify: restart agent
  tags:
    - userparam
